<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Mis Plantas">
    <meta name="theme-color" content="#ffffff">
    <meta name="description" content="Seguimiento de plantas - Lista de producción Michigan">
    <title>Mis Plantas — Seguimiento</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
</head>

<body>

    <!-- header -->
    <header class="header">
        <div class="header-inner">
            <div class="header-left">
                <span class="logo-icon">🌱</span>
                <div>
                    <h1 class="header-title">Mis Plantas</h1>
                    <p class="header-subtitle" id="headerSubtitle">871 órdenes de producción</p>
                </div>
            </div>
            <div class="header-right" style="display: flex; gap: 12px; align-items: center;">
                <div class="action-buttons" style="display: flex; gap: 8px;">
                    <button id="btnExport" class="btn-secondary" title="Exportar a Excel">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="17 8 12 3 7 8" />
                            <line x1="12" y1="3" x2="12" y2="15" />
                        </svg>
                        Exportar
                    </button>
                    <label class="btn-secondary" title="Importar Excel" style="cursor: pointer;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="7 10 12 15 17 10" />
                            <line x1="12" y1="15" x2="12" y2="3" />
                        </svg>
                        Importar
                        <input type="file" id="fileImport" accept=".xlsx, .xls" style="display: none;">
                    </label>
                </div>
                <div class="stats-pill" id="statsPill">
                    <span class="stats-done" id="statsDone">0</span>
                    <span class="stats-sep">/</span>
                    <span class="stats-total" id="statsTotal">871</span>
                </div>
            </div>
        </div>
    </header>

    <!-- view switcher -->
    <div class="view-bar">
        <div class="view-bar-inner">
            <div class="view-tabs">
                <button class="view-tab active" data-view="list" id="viewList">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="8" y1="6" x2="21" y2="6" />
                        <line x1="8" y1="12" x2="21" y2="12" />
                        <line x1="8" y1="18" x2="21" y2="18" />
                        <line x1="3" y1="6" x2="3.01" y2="6" />
                        <line x1="3" y1="12" x2="3.01" y2="12" />
                        <line x1="3" y1="18" x2="3.01" y2="18" />
                    </svg>
                    Lista
                </button>
                <button class="view-tab" data-view="calendar" id="viewCalendar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg>
                    Calendario
                </button>
            </div>
            <div class="tab-pills">
                <button class="tab-pill active" data-tab="pending" id="tabPending">
                    Pendientes <span class="pill-count" id="pendingCount">0</span>
                </button>
                <button class="tab-pill" data-tab="completed" id="tabCompleted">
                    Completadas <span class="pill-count" id="completedCount">0</span>
                </button>
            </div>
        </div>
    </div>

    <!-- filters section -->
    <div class="filters-section">
        <div class="filters-inner">
            <!-- search -->
            <div class="search-wrap">
                <svg class="search-svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <input type="text" id="searchInput" placeholder="Buscar por nombre, código, orden..." autocomplete="off"
                    autocapitalize="off">
                <button class="search-clear" id="clearSearch" aria-label="Limpiar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>

            <!-- filter row -->
            <div class="filter-row">
                <button class="filter-toggle" id="filterToggle">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />
                    </svg>
                    Filtros
                    <span class="filter-badge" id="filterBadge" style="display:none;">0</span>
                </button>
                <div class="sort-group">
                    <label class="sort-label">Ordenar:</label>
                    <select class="sort-select" id="sortSelect">
                        <option value="date-asc">Fecha ↑ (próximo primero)</option>
                        <option value="date-desc">Fecha ↓ (último primero)</option>
                        <option value="name-asc">Nombre A → Z</option>
                        <option value="name-desc">Nombre Z → A</option>
                        <option value="quantity-desc">Cantidad ↓ (mayor)</option>
                        <option value="quantity-asc">Cantidad ↑ (menor)</option>
                    </select>
                </div>
            </div>

            <!-- expanded filters -->
            <div class="filter-panel" id="filterPanel" style="display:none;">
                <div class="filter-grid">
                    <div class="filter-item">
                        <label class="filter-label">Estado</label>
                        <select class="filter-select" id="filterStatus">
                            <option value="">Todos</option>
                            <option value="active">🟢 En progreso</option>
                            <option value="upcoming">🔵 Próximo</option>
                            <option value="overdue">🔴 Vencido</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label class="filter-label">Ubicación (Bin)</label>
                        <select class="filter-select" id="filterBin">
                            <option value="">Todos</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label class="filter-label">Fecha inicio (desde)</label>
                        <input type="date" class="filter-input" id="filterDateFrom">
                    </div>
                    <div class="filter-item">
                        <label class="filter-label">Fecha inicio (hasta)</label>
                        <input type="date" class="filter-input" id="filterDateTo">
                    </div>
                    <div class="filter-item">
                        <label class="filter-label">Cantidad mínima</label>
                        <input type="number" class="filter-input" id="filterQtyMin" placeholder="0" min="0">
                    </div>
                    <div class="filter-item">
                        <label class="filter-label">Cantidad máxima</label>
                        <input type="number" class="filter-input" id="filterQtyMax" placeholder="99999" min="0">
                    </div>
                </div>
                <div class="filter-actions">
                    <button class="filter-clear-btn" id="filterClearAll">Limpiar filtros</button>
                    <button class="filter-apply-btn" id="filterApply">Aplicar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- list view -->
    <main class="content" id="listView">
        <div class="content-inner">
            <!-- table header for desktop -->
            <div class="table-header" id="tableHeader">
                <span class="th-cell th-name">Planta</span>
                <span class="th-cell th-qty">Cant.</span>
                <span class="th-cell th-bin">Bin</span>
                <span class="th-cell th-order">Orden</span>
                <span class="th-cell th-item">Item No.</span>
                <span class="th-cell th-dates">Fechas</span>
                <span class="th-cell th-status">Estado</span>
                <span class="th-cell th-action"></span>
            </div>
            <div class="plant-rows" id="plantList"></div>
        </div>
    </main>

    <!-- calendar view -->
    <div class="calendar-view" id="calendarView" style="display:none;">
        <div class="content-inner">
            <div class="cal-nav">
                <button class="cal-nav-btn" id="calPrev">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6" />
                    </svg>
                </button>
                <h2 class="cal-month" id="calMonth"></h2>
                <button class="cal-nav-btn" id="calNext">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6" />
                    </svg>
                </button>
            </div>
            <div class="cal-grid">
                <div class="cal-weekdays">
                    <span>Lun</span><span>Mar</span><span>Mié</span><span>Jue</span><span>Vie</span><span>Sáb</span><span>Dom</span>
                </div>
                <div class="cal-days" id="calDays"></div>
            </div>
            <!-- day detail panel -->
            <div class="cal-detail" id="calDetail" style="display:none;">
                <h3 class="cal-detail-title" id="calDetailTitle"></h3>
                <div class="cal-detail-list" id="calDetailList"></div>
            </div>
        </div>
    </div>

    <!-- empty state -->
    <div class="empty-state" id="emptyState" style="display:none;">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#c8d9cf" stroke-width="1.5">
            <path d="M12 22c-4.97 0-9-2.69-9-6v-4" />
            <path d="M3 8c0-3.31 4.03-6 9-6s9 2.69 9 6-4.03 6-9 6" />
            <path d="M12 14v8" />
            <path d="M9 17l3-3 3 3" />
        </svg>
        <p class="empty-text" id="emptyText">No se encontraron plantas</p>
    </div>

    <!-- toast -->
    <div class="toast" id="toast" style="display:none;">
        <div class="toast-body">
            <svg class="toast-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
            <span class="toast-msg" id="toastMsg"></span>
        </div>
        <button class="toast-undo" id="toastUndo">Deshacer</button>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(() => { });
        }
    </script>
</body>

</html>
